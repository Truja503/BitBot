{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}BitBot{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'home/css/tokens.css' %}" />
  <link rel="stylesheet" href="{% static 'home/css/auth.css' %}" />
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-ring">₿</div>
      <h1>BitBot</h1>
      <p>Learning Bitcoin has never been this easy</p>
    </div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
