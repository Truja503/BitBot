{% extends "home/auth_base.html" %}
{% block title %}Log in — BitBot{% endblock %}

{% block content %}
  <h2>Log in</h2>

  {% if error %}
    <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label for="nombre">Username</label>
      <input type="text" id="nombre" name="nombre" placeholder="Satoshi123" autocomplete="off" required />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required />
    </div>
    <button type="submit" class="btn-primary">Log in</button>
  </form>

  <div class="auth-link">
    No account yet? <a href="{% url 'registro' %}">Sign up</a>
  </div>
{% endblock %}
