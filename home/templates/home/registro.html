{% extends "home/auth_base.html" %}
{% block title %}Crear cuenta — BitBot{% endblock %}

{% block content %}
  <h2>Crear cuenta</h2>

  {% if error %}
    <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label for="nombre">Nombre de usuario</label>
      <input type="text" id="nombre" name="nombre" placeholder="Satoshi123" autocomplete="off" required />
    </div>
    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required />
    </div>
    <button type="submit" class="btn-primary">Registrarme</button>
  </form>

  <div class="auth-link">
    ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a>
  </div>
{% endblock %}
